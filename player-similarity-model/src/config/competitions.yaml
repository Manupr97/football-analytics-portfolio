# =============================================================================
# competitions.yaml — Configuración declarativa de competiciones
#
# CÓMO AÑADIR UNA COMPETICIÓN NUEVA:
#   1. Navega manualmente a la página de fixtures en es.whoscored.com
#   2. La URL tiene el patrón:
#      /regions/{region_id}/tournaments/{tournament_id}/seasons/{season_id}/
#      stages/{stage_id}/fixtures/{slug}
#   3. Copia esos IDs aquí. Son estables durante toda la temporada.
#   4. Para la siguiente temporada: solo actualiza season_id, stage_id y
#      fixtures_url. El resto no cambia.
#
# IMPORTANTE:
#   - comp_key debe ser único y snake_case. Es la clave que se usa en todo
#     el código: pipeline, DB, API endpoints, logs.
#   - tier: 0=europeo/internacional, 1=primera división, 2=segunda división
#   - Los season_id marcados con '# TODO' hay que buscarlos manualmente.
# =============================================================================

